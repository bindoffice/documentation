<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文档中心</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f9fafb;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }

    .container {
      max-width: 600px;
      width: 90%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 24px;
      color: #1a73e8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0 0 24px 0;
    }

    li {
      margin: 12px 0;
    }

    a {
      display: block;
      padding: 12px 16px;
      text-decoration: none;
      color: #1a73e8;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    a:hover {
      background-color: #f0f8ff;
      border-color: #1a73e8;
      color: #0d47a1;
      box-shadow: 0 2px 8px rgba(26, 115, 232, 0.15);
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 12px;
      color: #5f6368;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>文档中心</h1>

    <div class="section-title">Office 文档</div>
    <ul>
      <li><a href="/documentation/office/zh-hans/">Office 文档中文版</a></li>
      <li><a href="/documentation/office/en-us/">Office Documentation (English)</a></li>
    </ul>

    <div class="section-title">Meet 文档</div>
    <ul>
      <li><a href="/documentation/meet/zh-hans/">Meet 文档中文版</a></li>
      <li><a href="/documentation/meet/en-us/">Meet Documentation (English)</a></li>
    </ul>
  </div>
</body>
</html>
